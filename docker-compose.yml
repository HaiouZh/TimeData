services:
  timedata:
    image: ghcr.io/haiouzh/timedata:${TIMEDATA_IMAGE_TAG:-latest}
    pull_policy: always
    container_name: timedata
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
      - ${DIARY_VAULT_HOST_DIR:-./vault}:/app/vault
    environment:
      - AUTH_TOKEN=${AUTH_TOKEN}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - NODE_ENV=production
      - DB_PATH=${DB_PATH:-/app/data/timedata.db}
      - PORT=3000
      - WATCHTOWER_URL=http://watchtower:8080
      - WATCHTOWER_TOKEN=${WATCHTOWER_TOKEN}
      - UPDATE_REPO=${UPDATE_REPO:-HaiouZh/TimeData}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - DIARY_VAULT_DIR=${DIARY_VAULT_DIR-/app/vault}
    depends_on:
      - watchtower
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - timedata-internal
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: timedata-watchtower
    restart: unless-stopped
    command:
      - --label-enable
      - --cleanup
      - --http-api-update
      - --http-api-periodic-polls=false
    environment:
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_TOKEN}
      - DOCKER_API_VERSION=1.44
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - timedata-internal

networks:
  timedata-internal:
