services:
  timedata:
    image: ghcr.io/haiouzh/timedata:latest
    pull_policy: always
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AUTH_TOKEN=${AUTH_TOKEN}
      - NODE_ENV=production
      - DB_PATH=${DB_PATH:-/app/data/timedata.db}
      - PORT=3000
      - HOST_COMPOSE_DIR=${HOST_COMPOSE_DIR}
      - UPDATE_REPO=${UPDATE_REPO:-HaiouZh/TimeData}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
