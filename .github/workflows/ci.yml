name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.10.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: pnpm audit --audit-level=high --prod

      - name: Lint
        run: pnpm lint

      - name: UI controls guard
        run: pnpm check:ui

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r --parallel test

      - name: Docs consistency (strict)
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        run: pnpm check:docs:strict --since=${{ github.event.pull_request.base.sha }}

      - name: Docs consistency (warn, dependabot)
        if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
        run: pnpm check:docs --since=${{ github.event.pull_request.base.sha }}

      - name: Build
        run: pnpm build

