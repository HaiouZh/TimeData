name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  TZ: Asia/Shanghai

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: pnpm audit --audit-level=high --prod

      - name: Lint
        run: pnpm lint

      - name: UI controls guard
        run: pnpm check:ui

      - name: Design language guard
        run: pnpm check:design

      - name: Test hygiene guard
        run: pnpm check:test

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test (non-client packages)
        run: pnpm -r --parallel --filter '!@timedata/client' test

      - name: Script tests
        run: pnpm test:scripts

      # 默认 test 只跑 unit；e2e（forks 池、30s timeout）单独跑，避免拖慢日常 test 又不丢覆盖。
      - name: E2E tests
        run: pnpm --filter @timedata/client test:e2e

      - name: Docs consistency (strict)
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        run: pnpm check:docs:strict --since=${{ github.event.pull_request.base.sha }}

      - name: Docs consistency (warn, dependabot)
        if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
        run: pnpm check:docs --since=${{ github.event.pull_request.base.sha }}

      - name: Docs size ratchet
        run: pnpm check:docs:size

      - name: Docs coverage ratchet
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        run: pnpm check:docs:coverage --since=${{ github.event.pull_request.base.sha }}

      - name: Docs link integrity
        run: pnpm check:docs:links

      - name: Build
        run: pnpm build

  client-unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Client unit tests (shard ${{ matrix.shard }}/4)
        run: pnpm --filter @timedata/client exec vitest run --project unit --shard=${{ matrix.shard }}/4
