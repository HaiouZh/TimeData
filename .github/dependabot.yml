version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    # 用 increase 而不是 increase-if-necessary：后者在新版本仍满足 caret
    # 范围时不会改 package.json 的 spec，但会改 pnpm-lock.yaml 的 specifier，
    # 导致 pnpm install --frozen-lockfile 直接拒绝。
    versioning-strategy: increase
    labels: ["deps"]
    ignore:
      - dependency-name: "@capacitor/*"
        update-types: ["version-update:semver-major"]
    groups:
      patch-and-minor:
        update-types: ["patch", "minor"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels: ["ci", "deps"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "docker"
    directory: "/packages/server"
    schedule:
      interval: "weekly"
    labels: ["docker", "deps"]
